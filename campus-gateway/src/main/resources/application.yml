server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: optional:nacos:gateway-service.yaml
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yaml
        shared-configs:
          - data-id: common-config.yaml
            refresh: true
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
        - id: canteen-service
          uri: lb://canteen-service
          predicates:
            - Path=/api/canteen/**
        - id: merchant-service
          uri: lb://merchant-service
          predicates:
            - Path=/api/merchant/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payment/**
        - id: notice-service
          uri: lb://notice-service
          predicates:
            - Path=/api/notice/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "*"
            allowed-headers: "*"
            max-age: 3600

logging:
  level:
    com.campus: debug
    org.springframework.cloud.gateway: info
