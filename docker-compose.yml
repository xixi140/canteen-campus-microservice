version: '3.8'

services:
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: campus-nacos
    platform: linux/amd64
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - NACOS_AUTH_ENABLE=false
      - JVM_XMS=256m
      - JVM_XMX=256m
      - JVM_XMN=128m
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
    networks:
      - campus-network
    mem_limit: 1024m

  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
      - mysql-data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - campus-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: campus-redis
    ports:
      - "6379:6379"
    networks:
      - campus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  seata-server:
    image: seataio/seata-server:2.0.0
    container_name: campus-seata
    platform: linux/amd64
    ports:
      - "8091:8091"
      - "7091:7091"
    environment:
      - SEATA_PORT=8091
      - STORE_MODE=file
    volumes:
      - ./docker-data/seata:/seata-server/resources
    depends_on:
      nacos:
        condition: service_started
    networks:
      - campus-network
    mem_limit: 512m

networks:
  campus-network:
    driver: bridge
    name: campus-network

volumes:
  nacos-data:
  mysql-data:
